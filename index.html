<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente Integral de Acondicionamiento Humano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1D9E75; --green-d:#0F6E56; --green-l:#E8F8F2; --green-deep:#064535;
  --blue:#1A6FBF; --blue-l:#EBF4FF;
  --amber:#B8620A; --amber-l:#FEF3E2;
  --red:#C93535; --red-l:#FEF0F0;
  --purple:#6B4FBB; --purple-l:#F0ECFF;
  --bg:#F7F7F5; --white:#FFFFFF;
  --text:#111110; --muted:#6B6A63; --faint:#A8A79F;
  --border:#E5E4DF; --border-d:#CFCEC8;
  --r:10px; --r-lg:16px; --r-xl:20px;
  --shadow:0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── API SCREEN ── */
#api-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#0a2018 0%,#0d3525 50%,#0a2018 100%)}
.api-card{background:var(--white);border-radius:var(--r-xl);padding:3rem 2.5rem;max-width:460px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
.api-logo{display:inline-flex;align-items:center;gap:8px;margin-bottom:2rem}
.api-logo-icon{width:40px;height:40px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.api-logo-text{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.01em}
.api-logo-text span{color:var(--green)}
.api-card h1{font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-0.03em}
.api-card p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:2rem}
.api-input-wrap{position:relative;margin-bottom:12px}
.api-input-wrap input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;font-family:monospace;background:var(--bg);transition:border .2s;letter-spacing:.05em}
.api-input-wrap input:focus{outline:none;border-color:var(--green);background:var(--white)}
.api-note{font-size:12px;color:var(--faint);margin-top:1.25rem;line-height:1.6}
.api-note a{color:var(--green);text-decoration:none}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh}
.topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-icon{width:30px;height:30px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.topbar-name{font-size:13px;font-weight:700;letter-spacing:-0.01em}
.topbar-name span{color:var(--green)}
.topbar-right{display:flex;align-items:center;gap:10px}
.phase-chip{font-size:11px;font-weight:600;color:var(--muted);background:var(--bg);padding:5px 12px;border-radius:20px;border:1px solid var(--border);letter-spacing:.02em}
.key-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.key-btn:hover{background:var(--bg);color:var(--text)}
.progress-bar{height:3px;background:var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#2DD4A0);transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── MAIN ── */
.main{max-width:660px;margin:0 auto;padding:2.5rem 1.5rem 5rem}

/* ── STEP DOTS ── */
.dots-row{display:flex;gap:4px;margin-bottom:2rem}
.dot{height:3px;border-radius:2px;background:var(--border);transition:all .3s;flex:1}
.dot.done{background:var(--green-l);background:linear-gradient(90deg,var(--green-d),var(--green))}
.dot.active{background:var(--green);box-shadow:0 0 8px rgba(29,158,117,.4)}

/* ── PAGE HEADER ── */
.phase-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green-d);background:var(--green-l);padding:4px 12px;border-radius:20px;margin-bottom:14px;border:1px solid rgba(29,158,117,.15)}
.page-title{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1.2;margin-bottom:8px}
.page-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:2rem}

/* ── INFO BOXES ── */
.mission-box{background:linear-gradient(135deg,var(--green-deep) 0%,#0d3525 100%);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:1.5rem;position:relative;overflow:hidden}
.mission-box::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05)}
.mission-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px}
.mission-text{font-size:14px;color:rgba(255,255,255,.92);line-height:1.7;font-style:italic;font-weight:400}

.principle-box{background:var(--green-l);border-left:3px solid var(--green);border-radius:var(--r);padding:14px 18px;margin-bottom:1.5rem;font-size:13px;color:var(--green-deep);line-height:1.7;border:1px solid rgba(29,158,117,.15);border-left:3px solid var(--green)}
.alert-box{background:var(--amber-l);border-left:3px solid var(--amber);border-radius:var(--r);padding:14px 18px;margin-bottom:1.5rem;font-size:13px;color:#4A2800;line-height:1.7;border:1px solid rgba(184,98,10,.15);border-left:3px solid var(--amber)}
.alert-box strong{color:#2E1800;font-weight:700}

/* ── FORM ── */
.field{margin-bottom:1.25rem}
.field>label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.02em;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;font-family:'Inter',sans-serif;background:var(--white);color:var(--text);transition:border .2s,box-shadow .2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
.field textarea{min-height:80px;resize:vertical;line-height:1.6}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── CHOICE BUTTONS ── */
.cgrid{display:grid;gap:8px;margin-bottom:.5rem}
.cgrid.c2{grid-template-columns:1fr 1fr}
.cgrid.c3{grid-template-columns:1fr 1fr 1fr}
.cb{padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;text-align:left;background:var(--white);color:var(--text);font-size:13px;transition:all .15s;line-height:1.4;font-family:'Inter',sans-serif;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.cb:hover{border-color:var(--border-d);background:var(--bg);transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.08)}
.cb.sel{border-color:var(--green);background:var(--green-l);color:var(--green-deep);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
.cb .ct{font-weight:600;font-size:13px}
.cb .cs{font-size:11px;color:var(--muted);margin-top:3px}
.cb.sel .cs{color:var(--green-d)}

/* ── SCALE ── */
.scale-wrap{margin-bottom:1.25rem}
.ql{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.5}
.srow{display:flex;gap:4px;margin-bottom:4px}
.sb{flex:1;padding:9px 3px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;text-align:center;background:var(--white);font-size:12px;font-weight:500;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif}
.sb:hover{background:var(--bg);border-color:var(--border-d)}
.sb.sel{border-color:var(--green);background:var(--green-l);color:var(--green-d);font-weight:700;box-shadow:0 0 0 2px rgba(29,158,117,.15)}
.slabels{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);margin-bottom:.75rem;font-weight:500;letter-spacing:.02em}

/* ── YES/NO ── */
.yn-wrap{margin-bottom:1.1rem}
.yn-row{display:flex;gap:10px}
.yn{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;text-align:center;background:var(--white);font-size:14px;font-weight:600;color:var(--text);transition:all .15s;font-family:'Inter',sans-serif}
.yn:hover{background:var(--bg)}
.yn-si{border-color:var(--red);background:var(--red-l);color:var(--red)}
.yn-no{border-color:var(--green);background:var(--green-l);color:var(--green-d)}

/* ── FUNC CARDS ── */
.func-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.func-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.func-inst{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;background:var(--bg);padding:10px 12px;border-radius:8px;border-left:2px solid var(--border-d)}

/* ── NAV ── */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.btn-back{background:none;border:1.5px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;padding:11px 20px;font-family:'Inter',sans-serif;transition:all .15s}
.btn-back:hover{background:var(--bg);color:var(--text);border-color:var(--border-d)}
.step-count{font-size:12px;color:var(--faint);font-weight:500}
.btn-next{background:linear-gradient(135deg,var(--green) 0%,var(--green-d) 100%);color:white;border:none;border-radius:var(--r);padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;box-shadow:0 4px 12px rgba(29,158,117,.3),0 1px 3px rgba(29,158,117,.2);letter-spacing:-.01em}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,158,117,.4)}
.btn-next:active{transform:translateY(0)}

/* ── GENERATING ── */
.gen-wrap{text-align:center;padding:4rem 1rem}
.gen-ring{width:56px;height:56px;border:3px solid var(--green-l);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-title{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:10px}
.gen-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:380px;margin:0 auto 2.5rem}
.gen-steps{list-style:none;text-align:left;max-width:340px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.gen-steps li{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}
.gen-steps li .dot-s{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;transition:all .3s}
.gen-steps li.done .dot-s{background:var(--green)}
.gen-steps li.done{color:var(--text)}
.gen-steps li.active{color:var(--text);font-weight:600}
.gen-steps li.active .dot-s{background:var(--green);animation:pulse .9s ease-in-out infinite;box-shadow:0 0 0 3px rgba(29,158,117,.2)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

/* ── RESULT ── */
.result-wrap{padding:0}

/* Result Header */
.result-cover{background:linear-gradient(135deg,#052E1C 0%,#0a4028 60%,#073322 100%);border-radius:var(--r-xl);padding:2.5rem;margin-bottom:2rem;position:relative;overflow:hidden}
.result-cover::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(29,158,117,.15)}
.result-cover::after{content:'';position:absolute;bottom:-30px;left:20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04)}
.result-eyebrow{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px}
.result-name{font-size:30px;font-weight:800;color:white;letter-spacing:-.03em;margin-bottom:6px;line-height:1.2;position:relative}
.result-date{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:1.5rem}
.result-badges{display:flex;flex-wrap:wrap;gap:8px;position:relative}
.rbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px}
.rb-green{background:rgba(29,158,117,.25);color:#6FEFC0;border:1px solid rgba(29,158,117,.3)}
.rb-blue{background:rgba(26,111,191,.25);color:#7BC4FF;border:1px solid rgba(26,111,191,.3)}
.rb-amber{background:rgba(184,98,10,.25);color:#FFB84D;border:1px solid rgba(184,98,10,.3)}
.rb-red{background:rgba(201,53,53,.25);color:#FF8A8A;border:1px solid rgba(201,53,53,.3)}

/* Result Body */
.result-body{font-size:14px;line-height:1.85;color:var(--text)}
.result-body h2{font-size:18px;font-weight:800;letter-spacing:-.02em;margin:2.5rem 0 1rem;color:var(--text);display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.result-body h2::before{content:'';display:inline-block;width:4px;height:20px;background:var(--green);border-radius:2px;flex-shrink:0}
.result-body h3{font-size:15px;font-weight:700;margin:1.5rem 0 .6rem;color:var(--green-d)}
.result-body p{margin-bottom:.85rem}
.result-body ul{padding-left:1.25rem;margin-bottom:.85rem}
.result-body li{margin-bottom:5px;line-height:1.7}
.result-body strong{color:var(--text);font-weight:700}
.result-body em{font-style:italic;color:var(--muted)}
.result-body hr{border:none;border-top:1px solid var(--border);margin:1.5rem 0}

/* Tables in result */
.result-body table{width:100%;border-collapse:collapse;margin:1rem 0 1.25rem;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);font-size:13px}
.result-body thead tr{background:var(--green-deep);color:white}
.result-body thead th{padding:10px 14px;text-align:left;font-weight:700;font-size:12px;letter-spacing:.03em}
.result-body tbody tr{border-bottom:1px solid var(--border)}
.result-body tbody tr:nth-child(even){background:var(--bg)}
.result-body tbody tr:hover{background:var(--green-l)}
.result-body tbody td{padding:9px 14px;vertical-align:top;line-height:1.5}
.result-body tbody td:first-child{font-weight:600;color:var(--text)}

/* Action row */
.action-row{margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px}
.btn-act{border:none;border-radius:var(--r);padding:12px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:-.01em}
.btn-act:hover{transform:translateY(-1px)}
.btn-print{background:linear-gradient(135deg,var(--green),var(--green-d));color:white;box-shadow:0 4px 12px rgba(29,158,117,.3)}
.btn-copy{background:linear-gradient(135deg,var(--blue),#1457A0);color:white;box-shadow:0 4px 12px rgba(26,111,191,.25)}
.btn-new{background:var(--white);color:var(--muted);border:1.5px solid var(--border)}
.btn-new:hover{color:var(--text);border-color:var(--border-d)}

.error-box{background:var(--red-l);border:1.5px solid var(--red);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:1.5rem;font-size:14px;color:var(--red);line-height:1.7}
.error-box strong{color:#7A1C1C;font-weight:700}
.error-box a{color:var(--red)}

/* Print styles */
@media print{
  .topbar,.progress-bar,.dots-row,.nav,.action-row,.key-btn{display:none!important}
  .main{max-width:100%;padding:0}
  body{background:white}
  .result-cover{background:#064535!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .result-body table{box-shadow:none;border:1px solid var(--border)}
}

@media(max-width:520px){
  .g2,.g3{grid-template-columns:1fr}
  .cgrid.c3{grid-template-columns:1fr 1fr}
  .main{padding:1.5rem 1rem 4rem}
  .result-name{font-size:24px}
  .result-cover{padding:1.75rem}
}
</style>
</head>
<body>

<!-- ── API SCREEN ── -->
<div id="api-screen">
  <div class="api-card">
    <div class="api-logo">
      <div class="api-logo-icon">🏋️</div>
      <div class="api-logo-text">Agente <span>Acondicionamiento</span> Humano</div>
    </div>
    <h1>Bienvenido al sistema</h1>
    <p>Ingresa tu API Key de Anthropic para activar el motor de inteligencia. Se guarda solo en este dispositivo.</p>
    <div class="api-input-wrap">
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off">
    </div>
    <button class="btn-next" style="width:100%;justify-content:center" onclick="saveApiKey()">Activar sistema →</button>
    <p class="api-note">Obtén tu key en <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys</p>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-icon">🏋️</div>
      <div class="topbar-name">Agente <span>Acondicionamiento</span> Humano</div>
    </div>
    <div class="topbar-right">
      <div class="phase-chip" id="phase-chip">Fase 1</div>
      <button class="key-btn" onclick="changeKey()">⚙ API Key</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:4%"></div></div>
  <div class="main">
    <div class="dots-row" id="dots-row"></div>
    <div id="content"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let step = 0, D = {}, apiKey = '';
const PHASES = [
  {p:'Fase 1',l:'Datos personales'},{p:'Fase 1',l:'Antropometría'},
  {p:'Fase 2',l:'Objetivo real'},{p:'Fase 1',l:'Salud · PAR-Q+'},
  {p:'Fase 1',l:'Historial deportivo'},{p:'Fase 3',l:'Movilidad funcional'},
  {p:'Fase 3',l:'Fuerza funcional'},{p:'Fase 3',l:'Resistencia y equilibrio'},
  {p:'Fase 1',l:'Sueño y recuperación'},{p:'Fase 1',l:'Estrés y psicología'},
  {p:'Fase 8',l:'Nutrición'},{p:'Fase 5',l:'Contexto y recursos'},
  {p:'Fase 4',l:'Diagnóstico final'}
];
const T = PHASES.length;

// ── API KEY ────────────────────────────────────────────────────────────────
function saveApiKey(){
  const v = document.getElementById('api-key-input').value.trim();
  if(!v.startsWith('sk-ant')){alert('La API key debe comenzar con sk-ant-...');return;}
  apiKey = v; localStorage.setItem('aah_key', v);
  document.getElementById('api-screen').style.display='none';
  document.getElementById('app').style.display='block'; render();
}
function changeKey(){
  localStorage.removeItem('aah_key'); apiKey='';
  document.getElementById('api-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
window.onload = ()=>{
  const s=localStorage.getItem('aah_key');
  if(s&&s.startsWith('sk-ant')){
    apiKey=s;
    document.getElementById('api-screen').style.display='none';
    document.getElementById('app').style.display='block'; render();
  }
  document.getElementById('api-key-input').addEventListener('keypress',e=>{if(e.key==='Enter')saveApiKey();});
};

// ── HELPERS ────────────────────────────────────────────────────────────────
const sv=id=>document.getElementById(id)?.value||'';
function single(k,v){D[k]=v;document.querySelectorAll(`[data-s="${k}"]`).forEach(b=>b.classList.toggle('sel',b.dataset.v===v));}
function multi(k,v){if(!D[k])D[k]=[];const i=D[k].indexOf(v);i>-1?D[k].splice(i,1):D[k].push(v);document.querySelectorAll(`[data-m="${k}"]`).forEach(b=>b.classList.toggle('sel',(D[k]||[]).includes(b.dataset.v)));}
function scale(k,v){D[k]=v;document.querySelectorAll(`[data-sc="${k}"]`).forEach(b=>b.classList.toggle('sel',b.dataset.v==v));}
function yn(k,v){D[k]=v;const row=document.querySelector(`[data-yr="${k}"]`);if(row){row.querySelectorAll('.yn').forEach(b=>b.className='yn');const t=row.querySelector(`[data-yv="${v}"]`);if(t)t.classList.add(v==='si'?'yn-si':'yn-no');}}
function SR(key,vals,lbl,l1,l2){return`<div class="scale-wrap"><p class="ql">${lbl}</p><div class="srow">${vals.map(v=>`<button class="sb ${D[key]==v.v?'sel':''}" data-sc="${key}" data-v="${v.v}" onclick="scale('${key}',${v.v})">${v.l}</button>`).join('')}</div>${l1?`<div class="slabels"><span>${l1}</span><span>${l2}</span></div>`:''}</div>`;}
function cg(key,items,cols,multi_){return`<div class="cgrid c${cols}">${items.map(([v,t,s])=>`<button class="cb ${(multi_?(D[key]||[]).includes(v):D[key]===v)?'sel':''}" data-${multi_?'m':'s'}="${key}" data-v="${v}" onclick="${multi_?'multi':'single'}('${key}','${v}')"><div class="ct">${t}</div>${s?`<div class="cs">${s}</div>`:''}</button>`).join('')}</div>`;}

// ── SAVE ───────────────────────────────────────────────────────────────────
const FIELDS={0:['nombre','edad','ocupacion'],1:['peso','estatura','cintura','cadera','brazo','muslo'],2:['evento_fecha'],3:['medicamentos','cirugias'],4:['lesiones_detalle'],10:['suplementos'],11:['equipo','info_extra']};
function saveStep(){(FIELDS[step]||[]).forEach(k=>{const e=document.getElementById(k);if(e)D[k]=e.value;});}

// ── DOTS ───────────────────────────────────────────────────────────────────
function renderDots(){document.getElementById('dots-row').innerHTML=PHASES.map((_,i)=>`<div class="dot ${i<step?'done':i===step?'active':''}"></div>`).join('');}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const ph=PHASES[step];
  document.getElementById('prog').style.width=((step+1)/T*100)+'%';
  document.getElementById('phase-chip').textContent=ph.p+' · '+ph.l;
  renderDots();
  document.getElementById('content').innerHTML=buildPage();
  restoreScales();
  window.scrollTo({top:0,behavior:'smooth'});
}
function wrap(phase,title,sub,body){
  return`<div class="phase-tag">${phase}</div><h1 class="page-title">${title}</h1><p class="page-sub">${sub}</p>${body}<div class="nav"><button class="btn-back" onclick="back()" ${step===0?'style="visibility:hidden"':''}>← Anterior</button><span class="step-count">${step+1} / ${T}</span><button class="btn-next" onclick="next()">${step===T-1?'Generar Plan Maestro ↗':'Continuar →'}</button></div>`;
}
function restoreScales(){
  ['horas_sueno','calidad_sueno','fatiga_manana','estres','motivacion','dias','disp_nutri','nivel_dolor','compromiso'].forEach(k=>{if(D[k]!==undefined)document.querySelectorAll(`[data-sc="${k}"]`).forEach(b=>b.classList.toggle('sel',b.dataset.v==D[k]));});
}

// ── SHOW PLAN ──────────────────────────────────────────────────────────────
function showPlan(text,imc,today){
  // Convert markdown to clean HTML
  let html=text
    .replace(/^#{1,2} (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');

  // Convert markdown tables to HTML tables
  html=html.replace(/(\|.+\|\n)+/g,match=>{
    const rows=match.trim().split('\n').filter(r=>!r.match(/^\|[\s\-:|]+\|$/));
    if(rows.length<2)return match;
    const [head,...body]=rows;
    const th=head.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const tb=body.map(r=>{const tds=r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');return`<tr>${tds}</tr>`;}).join('');
    return`<table><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`;
  });

  // Wrap remaining paragraphs
  html=html.replace(/\n{2,}/g,'</p><p>').replace(/^(?!<[hut])/gm,'');
  html='<p>'+html+'</p>';
  html=html.replace(/<p>\s*<\/p>/g,'').replace(/<p>(<[hut])/g,'$1').replace(/(<\/[hut][^>]*>)<\/p>/g,'$1');

  document.getElementById('phase-chip').textContent='Plan Maestro Generado ✓';
  document.getElementById('content').innerHTML=`
    <div class="result-wrap">
      <div class="result-cover">
        <div class="result-eyebrow">Plan Maestro Personalizado · Agente de Acondicionamiento Humano</div>
        <div class="result-name">Plan de ${D.nombre||'Tu cliente'}</div>
        <div class="result-date">${today} · ${D.edad} años · ${D.sexo_bio||''}</div>
        <div class="result-badges">
          <span class="rbadge rb-green">🎯 ${(D.objetivo||'').replace(/_/g,' ')}</span>
          <span class="rbadge rb-blue">📅 ${D.dias||'?'} días/semana · ${(D.duracion||'?').replace('_','–')}</span>
          <span class="rbadge rb-amber">⚖️ IMC ${imc}</span>
          ${parseInt(D.nivel_dolor)>3?`<span class="rbadge rb-red">⚠️ Dolor activo ${D.nivel_dolor}/10</span>`:''}
          ${['parq1','parq2','parq3','parq4','parq5','parq6','parq7','parq8'].some(k=>D[k]==='si')?'<span class="rbadge rb-red">🏥 Alertas PAR-Q+</span>':''}
        </div>
      </div>
      <div class="result-body">${html}</div>
      <div class="action-row">
        <button class="btn-act btn-print" onclick="window.print()">🖨 Imprimir / Guardar PDF</button>
        <button class="btn-act btn-copy" onclick="copyPlan()">📋 Copiar texto</button>
        <button class="btn-act btn-new" onclick="step=0;D={};render()">↺ Nueva evaluación</button>
      </div>
    </div>`;
}

  if(b)navigator.clipboard.writeText(b.innerText).then(()=>{
    const btn=event.target;btn.textContent='✓ Copiado';
    setTimeout(()=>btn.textContent='📋 Copiar texto',2000);
  });
}
